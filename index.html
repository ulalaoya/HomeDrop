<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeDrop .IL — קולקציית המבצעים לבית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f5f0e8;
      --card-bg:   #fdfaf5;
      --navy:      #1e3a4f;
      --gold:      #c9a227;
      --green:     #1a5c3a;
      --text:      #2c3830;
      --text-mid:  #5a6b60;
      --text-light:#9aab9f;
      --border:    #e4ddd0;
      --shadow:    rgba(30,58,79,0.08);
      --radius:    14px;
      --sidebar-w: 175px;
      --header-h:  58px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Background image as wallpaper ── */
    body {
      font-family: 'Heebo', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('HomeDrop New Theme.png') center top / cover no-repeat;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Sticky slim header ── */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--header-h);
      background: rgba(245,240,232,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 24px;
      direction: rtl;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      white-space: nowrap;
      letter-spacing: -0.5px;
      cursor: pointer;
    }
    .brand-name .il {
      color: var(--gold);
      font-size: 0.72em;
      font-style: italic;
      font-weight: 400;
    }
    .brand-tagline {
      font-size: 12px;
      color: var(--text-mid);
      white-space: nowrap;
    }
    .header-search {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      min-width: 200px;
      transition: border-color 0.18s;
    }
    .header-search:focus-within { border-color: var(--navy); }
    .header-search svg { color: var(--text-light); flex-shrink: 0; }
    .search-input {
      border: none; background: transparent;
      font-family: 'Heebo', sans-serif;
      font-size: 13px; color: var(--text);
      outline: none; width: 100%; direction: rtl;
    }
    .search-input::placeholder { color: var(--text-light); }

    /* ── Page body: sidebar + main ── */
    .page-body {
      display: flex;
      align-items: flex-start;
      position: relative;
      z-index: 1;
      min-height: calc(100vh - var(--header-h));
    }

    /* ── Left sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      padding: 16px 10px;
      background: rgba(244,239,229,0.9);
      backdrop-filter: blur(8px);
      border-left: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-light);
      padding: 4px 10px 8px;
    }
    .sidebar-sep {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }
    .filter-link {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 16px 12px;
      margin-bottom: 6px;
      border-radius: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: right;
      direction: rtl;
      transition: background 0.15s, color 0.15s;
    }
    .filter-link:hover { background: rgba(30,58,79,0.07); color: var(--navy); }
    .filter-link.active, .filter-link.active-deal {
      background: var(--navy);
      color: #fff;
      font-weight: 600;
    }
    .filter-link .fcount {
      font-size: 11px;
      opacity: 0.55;
      font-weight: 400;
      background: rgba(0,0,0,0.06);
      padding: 1px 6px;
      border-radius: 20px;
    }
    .filter-link.active .fcount, .filter-link.active-deal .fcount {
      background: rgba(255,255,255,0.2);
      opacity: 0.9;
    }
    .intl-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-mid);
      cursor: pointer;
      padding: 6px 10px;
    }
    .results-info {
      font-size: 12px;
      color: var(--text-light);
      padding: 6px 10px 0;
    }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      min-width: 0;
      padding: 16px 20px 40px;
    }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 14px;
    }
    .card {
      position: relative;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 14px 14px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: box-shadow 0.18s, transform 0.18s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(30,58,79,0.13);
      transform: translateY(-2px);
      z-index: 10;
    }
    .card.hidden { display: none; }
    .intl-badge {
      position: absolute;
      top: 8px; left: 8px;
      font-size: 13px;
    }
    .favicon-wrap {
      width: 52px; height: 52px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
    }
    .favicon-wrap img { width: 40px; height: 40px; object-fit: contain; }
    .favicon-letter {
      font-size: 22px; font-weight: 700;
      color: var(--navy);
    }
    .site-name {
      font-size: 14px; font-weight: 700;
      color: var(--navy); line-height: 1.2;
    }
    .site-domain { font-size: 11px; color: var(--text-light); }
    .sale-badge {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1.2px;
      padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase;
    }
    .sale-badge.badge-outlet  { background: #5c3d2e; color: #f5d9c5; }
    .sale-badge.badge-sale    { background: var(--green); color: #c8f0d8; }
    .sale-badge.badge-special { background: #7a6010; color: #fdeea3; }
    .sale-badge.badge-visit   { background: var(--navy); color: #b8d0e8; }
    .card-btn {
      margin-top: 4px;
      display: block;
      width: 100%;
      padding: 7px 0;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 12px; font-weight: 600;
      color: var(--navy);
      transition: all 0.15s;
    }
    .card:hover .card-btn {
      background: var(--navy); color: #fff; border-color: var(--navy);
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 12px 20px 20px;
      color: var(--text-light);
    }
    .empty-state img { width: 80px; opacity: 0.6; display: block; margin: 0 auto 16px; }
    .empty-state .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 8px 16px;
      font-size: 11px;
      color: var(--text-light);
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }
    footer .brand { display: none; }
    footer .il { color: var(--gold); }

    /* ── Info tooltip ── */
    .info-btn {
      position: relative;
      display: inline-block;
      cursor: default;
      font-size: 11px;
      color: var(--text-mid);
      background: none;
      border: none;
      padding: 2px 0;
      width: 100%;
      text-align: center;
    }
    .info-tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: 105%;
      right: 0;
      width: 240px;
      background: var(--navy);
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.6;
      text-align: right;
      z-index: 100;
      transition: opacity 0.2s;
      direction: rtl;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      pointer-events: none;
    }
    .info-btn:hover .info-tooltip {
      visibility: visible;
      opacity: 1;
    }

    @media (max-width: 640px) {
      :root { --sidebar-w: 120px; }
      .brand-tagline { display: none; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
</style>
</head>
<body>

<!-- ═══ SLIM HEADER ═══ -->
<header class="page-header">
  <div class="brand-name" onclick="resetAll()">HomeDrop <span class="il">.IL</span></div>
  <div class="brand-tagline">מקסימום מבצעים, מעל 170 אתרים בארץ ובעולם</div>
  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" type="text" id="search" placeholder="חפש אתר..." autocomplete="off">
  </div>
</header>

<!-- ═══ PAGE BODY ═══ -->
<div class="page-body">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">קטגוריה</div>
    <button class="filter-link active" data-cat="all"          onclick="selectCat('all',this)">         <span>הכל</span>        <span class="fcount" id="fcnt-all"></span></button>
    <button class="filter-link"        data-cat="general"      onclick="selectCat('general',this)">     <span>כללי</span>       <span class="fcount" id="fcnt-general"></span></button>
    <button class="filter-link"        data-cat="furniture"    onclick="selectCat('furniture',this)">   <span>ריהוט</span>      <span class="fcount" id="fcnt-furniture"></span></button>
    <button class="filter-link"        data-cat="rugs"         onclick="selectCat('rugs',this)">        <span>שטיחים</span>     <span class="fcount" id="fcnt-rugs"></span></button>
    <button class="filter-link"        data-cat="textiles"     onclick="selectCat('textiles',this)">    <span>טקסטיל</span>     <span class="fcount" id="fcnt-textiles"></span></button>
    <button class="filter-link"        data-cat="decor"        onclick="selectCat('decor',this)">       <span>עיצוב הבית</span>  <span class="fcount" id="fcnt-decor"></span></button>
    <button class="filter-link"        data-cat="accessories"  onclick="selectCat('accessories',this)"> <span>אקססוריז</span>   <span class="fcount" id="fcnt-accessories"></span></button>
    <button class="filter-link"        data-cat="walls"        onclick="selectCat('walls',this)">       <span>קירות</span>       <span class="fcount" id="fcnt-walls"></span></button>
    <button class="filter-link"        data-cat="kitchen"      onclick="selectCat('kitchen',this)">     <span>מטבח</span>        <span class="fcount" id="fcnt-kitchen"></span></button>
    <button class="filter-link"        data-cat="bathroom"     onclick="selectCat('bathroom',this)">    <span>אמבטיה</span>      <span class="fcount" id="fcnt-bathroom"></span></button>
    <button class="filter-link"        data-cat="allhome"      onclick="selectCat('allhome',this)">     <span>הכל לבית</span>   <span class="fcount" id="fcnt-allhome"></span></button>
    <button class="filter-link"        data-cat="lighting"     onclick="selectCat('lighting',this)">     <span>תאורה</span>       <span class="fcount" id="fcnt-lighting"></span></button>
    <div class="sidebar-sep"></div>
    <div class="sidebar-label">סוג מבצע</div>
    <button class="filter-link active-deal" data-deal="all"     onclick="selectDeal('all',this)">     <span>הכל</span>              <span class="fcount" id="dcnt-all"></span></button>
    <button class="filter-link"            data-deal="outlet"  onclick="selectDeal('outlet',this)">  <span>אאוטלט</span>           <span class="fcount" id="dcnt-outlet"></span></button>
    <button class="filter-link"            data-deal="sale"    onclick="selectDeal('sale',this)">    <span>יש סייל</span>          <span class="fcount" id="dcnt-sale"></span></button>
    <button class="filter-link"            data-deal="special" onclick="selectDeal('special',this)"> <span>מבצעים מיוחדים</span>   <span class="fcount" id="dcnt-special"></span></button>
    <button class="filter-link"            data-deal="visit"   onclick="selectDeal('visit',this)">   <span>שווה לבדוק</span>       <span class="fcount" id="dcnt-visit"></span></button>
    <div class="sidebar-sep"></div>
    <label class="intl-toggle">
      <input type="checkbox" id="intl-toggle" checked>
      בינלאומי (משלוחים לישראל)
    </label>
    <div class="results-info">מציג <span id="visible-count">101</span> אתרים</div>
  </aside>

  <!-- MAIN GRID -->
  <main class="main-content">
    <div class="grid" id="grid"></div>
  </main>

</div>

  { name:"משו משו", domain:"mashuhome.co.il", url:"https://mashuhome.co.il/product-category/%d7%9e%d7%91%d7%a6%d7%a2%d7%99%d7%9d/december-sale/", cat:"decor", intl:false, deal:"sale", about:`סטודיו משפחתי לעיצוב הבית שמציע רהיטים ואקססוריז נבחרים להלבשת הבית, עם דגש על שפה עיצובית ייחודית, תחושת בית והרמוניה, והתאמה אישית לצרכי הלקוח` },
  { name:"בלי", domain:"bali-studio.com", url:"https://www.bali-studio.com/product-category/sale", cat:"accessories", intl:false, deal:"sale", about:`בָּלי הוא סטודיו בוטיק לעיצוב ואבזור הבית ביהוד מונוסון, שמציע אקססוריז ופריטי נוי שנבחרים באהבה, עם ליווי אישי ליצירת בית נעים, אסתטי ומלא אופי` },
  { name:"YAIR DORAM", domain:"yairdoram.co.il", url:"https://yairdoram.co.il/outlet/", cat:"lighting", intl:false, deal:"sale", about:`חברת יאיר דורם נוסדה בשנת 1974 והפכה לחברה מובילה בתחום התאורה. כיום, החברה מייבאת כ-40 מותגים בינלאומיים המזוהים עם חדשנות, איכות ומחויבות עיצובית לתחום האדריכלות` },
  { name:"בלקו לד", domain:"bellco.co.il", url:"https://www.bellco.co.il/", cat:"lighting", intl:false, deal:"visit", about:`בלקו לד הוא מותג ישראלי מקבוצת Global LCS, המייצר גופי תאורת LED מעוצבים לבית ולחוץ בהתאמה אישית מלאה, ישירות מהמפעל בחולון לצרכן ולפרויקטים, ללא פערי תיווך ובליווי ייעוץ תאורה מקצועי` },
  { name:"דקורה", domain:"decora.co.il", url:"https://www.decora.co.il/search?type=product&options%5Bunavailable_products%5D=last&options%5Bprefix%5D=none&q=%D7%94%D7%A0%D7%97%D7%94*", cat:"accessories", intl:false, deal:"sale", about:`חנות אונליין לעיצוב הבית, המציעה מגוון גדול של פריטי דקורציה וריהוט ממותגים שונים מרחבי העולם, במחירים נגישים, עם שירות לקוחות זמין, אחריות מלאה ותשלום מאובטח` },
  { name:"קארמה", domain:"karma.co.il", url:"https://karma.co.il/search?q=sale", cat:"decor", intl:false, deal:"sale", about:`קארמה - המרכז לעיצוב הבית הוא מותג ורשת לעיצוב וריהוט הבית הפועלת משנת 2002, שמשלבת יבוא וייצור מקומי כדי להציע ריהוט, טקסטיל, תאורה ואקססוריז במגוון סגנונות, במחירים אטרקטיביים ועם ליווי הום סטיילינג מקצועי` },
  { name:"Homey Naomy", domain:"homeynaomy.co.il", url:"https://www.homeynaomy.co.il/", cat:"accessories", intl:false, deal:"visit", about:`חנות בוטיק ביתית לעיצוב, הלבשת הבית ומתנות כלי בית מיוחדים, מפות שולחן ומפיות, כלי בישול אפיה והגשה, אקססוריז, לייף סטייל ומוצרי אווירה` },
  { name:"Indian Shelf", domain:"indianshelf.com", url:"https://www.indianshelf.com/", cat:"allhome", intl:true, deal:"visit", about:`מרקטפלייס אונליין למוצרי עבודת יד הודיים, המבוססים על טכניקות ואומנויות מסורתיות, שמחבר אלפי בעלי מלאכה כפריים לשווקים מודרניים ומקדם תעסוקה כפרית ברת-קיימא ומוצרים ירוקים ואומנותיים` },
]
/* ════════════════════════════════════════════════════════
   RENDER ENGINE
════════════════════════════════════════════════════════ */
const FAVICON = d => `https://www.google.com/s2/favicons?domain=${d}&sz=64`;
const CAT_HE = { all:'כל האתרים', general:'כללי', furniture:'ריהוט', rugs:'שטיחים', textiles:'טקסטיל', decor:'עיצוב הבית', accessories:'אקססוריז', walls:'קירות', kitchen:'מטבח', bathroom:'אמבטיה', allhome:'הכל לבית', lighting:'תאורה' };

let activeCat = 'all';
let searchQ = '';
let showIntl = true;
let activeDeal = 'all';

function buildCard(s) {
  const letter = s.name.replace(/[^a-zA-Z\u05D0-\u05EA]/g, '')[0] || s.name[0] || '?';
  const intlMark = s.intl ? '<span class="intl-badge" title="אתר בינלאומי">🌍</span>' : '';
  const aboutHtml = s.about ? `<div class="info-btn">מידע נוסף ▲<div class="info-tooltip">${s.about}</div></div>` : '';
  return `
  <a class="card" href="${s.url}" target="_blank" rel="noopener noreferrer"
     data-cat="${s.cat}" data-intl="${s.intl}" data-name="${s.name.toLowerCase()} ${s.domain}">
    ${intlMark}
    <div class="favicon-wrap">
      <img
        src="${FAVICON(s.domain)}"
        alt="${s.name}"
        loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
      >
      <span class="favicon-letter" style="display:none">${letter}</span>
    </div>
    <div class="site-name">${s.name}</div>
    <div class="site-domain">${s.domain}</div>
    <div class="sale-badge badge-${s.deal}">${{outlet:'Outlet',sale:'Sale',special:'Special Offer',visit:'Check for Discounts'}[s.deal]||'Sale'}</div>
    ${aboutHtml}
    <span class="card-btn">
      לאתר המבצע
      <span class="arrow">←</span>
    </span>
  </a>`;
}

function countByCat(cat) {
  return SITES.filter(s =>
    (cat === 'all' || s.cat === cat) &&
    (activeDeal === 'all' || s.deal === activeDeal) &&
    (showIntl || !s.intl)
  ).length;
}

function render() {
  const grid = document.getElementById('grid');
  const q = searchQ.trim().toLowerCase();
  let count = 0;

  grid.innerHTML = SITES.map(s => {
    const catOk  = activeCat === 'all' || s.cat === activeCat;
    const dealOk = activeDeal === 'all' || s.deal === activeDeal;
    const intlOk = showIntl || !s.intl;
    const srchOk = !q || s.name.toLowerCase().includes(q) || s.domain.toLowerCase().includes(q);
    const show   = catOk && dealOk && intlOk && srchOk;
    if (show) count++;
    return buildCard(s).replace('<a class="card"', `<a class="card${show ? '' : ' hidden'}"`);;
  }).join('');

  document.getElementById('visible-count').textContent = count;
  if (count === 0) {
    grid.innerHTML += `<div class="empty-state"><span class="emoji">💡</span><p>לא נמצאו אתרים</p></div>`;
  }
  // Update filter button counts
  ['all','outlet','sale','special','visit'].forEach(d => {
    const nd = SITES.filter(s => (d === 'all' || s.deal === d) && (activeCat === 'all' || s.cat === activeCat) && (showIntl || !s.intl)).length;
    const fd = document.getElementById(`dcnt-${d}`);
    if (fd) fd.textContent = nd;
  });
  ['all','general','furniture','rugs','textiles','decor','accessories','walls','kitchen','bathroom','allhome','lighting'].forEach(c => {
    const n = countByCat(c);
    const fc = document.getElementById(`fcnt-${c}`);
    if (fc) fc.textContent = n;
    const btn = fc ? fc.closest('button') : null;
    if (btn && c !== 'all') btn.style.display = (n === 0) ? 'none' : '';
  });
  const stTotal = document.getElementById('stat-total');
  const stSale  = document.getElementById('stat-sale');
  if (stTotal) stTotal.textContent = SITES.length;
  if (stSale)  stSale.textContent  = SITES.length;
}

/* ════════ FILTER ════════ */
function resetAll() {
  activeCat  = 'all';
  activeDeal = 'all';
  document.getElementById('search').value = '';
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
  document.querySelectorAll('[data-deal]').forEach(b => b.classList.toggle('active-deal', b.dataset.deal === 'all'));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

function selectDeal(deal, btn) {
  activeDeal = deal;
  document.querySelectorAll('[data-deal]').forEach(b => b.classList.remove('active-deal'));
  if (btn) btn.classList.add('active-deal');
  render();
}

/* ════════ EVENT LISTENERS ════════ */

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  // Auto-switch to "all" when searching
  if (searchQ && activeCat !== 'all') {
    activeCat = 'all';
    document.querySelectorAll('.filter-link').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
  }
  render();
});

document.getElementById('intl-toggle').addEventListener('change', e => {
  showIntl = e.target.checked;
  render();
});

// Set today's date
const today = new Date();
document.getElementById('stat-date').textContent =
  today.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit' });

// Initial render
render();
</script>
</body>
</html>
